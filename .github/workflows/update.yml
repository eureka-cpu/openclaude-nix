name: Nightly Update
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check for new version
        id: check
        run: |
          current=$(grep -oP 'version = "\K[^"]+' packages/openclaude.nix | head -1)
          latest=$(curl -fsSL 'https://registry.npmjs.org/@gitlawb/openclaude/latest' | jq -r .version)
          echo "current=$current" | tee -a "$GITHUB_OUTPUT"
          echo "latest=$latest"   | tee -a "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "has_update=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.check.outputs.has_update == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run update script
        if: steps.check.outputs.has_update == 'true'
        run: bash packages/update.sh

      - name: Open PR
        if: steps.check.outputs.has_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.check.outputs.latest }}"
          branch="update/openclaude-v${version}"

          if gh pr list --head "$branch" --state open --json number \
               --jq '.[0].number' | grep -q '^[0-9]'; then
            echo "PR already open for $branch, skipping"
            exit 0
          fi

          git checkout -b "$branch"
          git add packages/openclaude.nix packages/package-lock.json
          git commit -m "chore: update openclaude to v${version}"
          git push --force origin "$branch"
          gh pr create \
            --title "chore: update openclaude to v${version}" \
            --body "Automated update of openclaude to v${version}." \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$branch"
