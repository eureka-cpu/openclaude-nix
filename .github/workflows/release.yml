name: Nightly Release
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        id: tag
        run: |
          version=$(grep -oP 'version = "\K[^"]+' packages/openclaude.nix | head -1)
          commit=$(git rev-parse --short HEAD)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}-${commit}" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.tag.outputs.tag }}" &>/dev/null; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "openclaude ${{ steps.tag.outputs.version }}" \
            --notes "Packages openclaude v${{ steps.tag.outputs.version }}."
